<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Vemuri</title>
  <meta name="description" content="Sri Vemuri — hey@mistersri.com">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F4EFE6;
      color: #1C1208;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 2rem 1.5rem;
        align-items: flex-start;
      }
    }

    main {
      max-width: 460px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    figure {
      width: 100%;
      overflow: hidden;
    }

    figure img {
      display: block;
      width: 100%;
      height: auto;
    }

    p {
      font-size: clamp(1.15rem, 2.8vw, 1.4rem);
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: 0.01em;
      text-align: justify;
    }

    .icon-row {
      display: flex;
      justify-content: flex-end;
    }

    a {
      display: inline-block;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: #B85530;
    }

    a svg {
      display: block;
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <img src="/images/photo.jpg" alt="Sri Vemuri">
    </figure>

    <p>Hi, I'm Sri. My earliest memories are of sundaes and milkshakes in my mom's ice cream parlor. I've kept life sweet since — spending the last decade scaling B2B SaaS startups, climbing whatever rock face is nearby, and chasing what makes me curious.</p>

    <div class="icon-row">
      <a href="https://linkedin.com/in/srivemuri" target="_blank" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">

        </svg>
      </a>
    </div>
  </main>
</body>
</html>
