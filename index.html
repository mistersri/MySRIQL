<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Vemuri</title>
  <meta name="description" content="Sri Vemuri — hey@mistersri.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F4EFE6;
      color: #1C1208;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    main {
      max-width: 460px;
      width: 100%;
    }

    figure {
      width: 100%;
      margin-bottom: 2.75rem;
      overflow: hidden;
    }

    figure svg {
      display: block;
      width: 100%;
      height: auto;
    }

    p {
      font-size: clamp(1.15rem, 2.8vw, 1.4rem);
      font-weight: 300;
      line-height: 1.82;
      letter-spacing: 0.01em;
      margin-bottom: 2rem;
    }

    a {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #B85530;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <svg viewBox="0 0 460 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="s" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="9"/>
          </filter>
          <filter id="m" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="18"/>
          </filter>
          <filter id="l" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="28"/>
          </filter>
        </defs>

        <!-- ground -->
        <rect width="460" height="320" fill="#C9A47A"/>

        <!-- warm ochre wash -->
        <rect width="460" height="320" fill="#B8884A" opacity="0.45" filter="url(#l)"/>

        <!-- dark anchoring mass at bottom -->
        <path d="M -10 230 C 80 210 180 205 260 210 C 340 215 420 225 470 240 L 470 330 L -10 330 Z"
              fill="#2E1408" opacity="0.92" filter="url(#m)"/>

        <!-- burnt sienna central mass -->
        <path d="M 30 90 C 90 50 200 40 300 75 C 390 108 430 165 405 220 C 378 270 285 278 180 255 C 80 232 -10 195 30 90 Z"
              fill="#B84A22" opacity="0.82" filter="url(#m)"/>

        <!-- warm peach bloom, upper center -->
        <ellipse cx="210" cy="115" rx="115" ry="75" fill="#E09060" opacity="0.45" filter="url(#l)"/>

        <!-- rich ochre shape, upper right -->
        <path d="M 310 30 C 385 10 455 55 465 115 L 465 190 C 440 210 385 195 340 162 C 295 128 260 72 310 30 Z"
              fill="#9A6820" opacity="0.68" filter="url(#m)"/>

        <!-- cream breath, left mid -->
        <ellipse cx="115" cy="175" rx="60" ry="42" fill="#EDD8B8" opacity="0.52" filter="url(#s)"/>

        <!-- small deep mark -->
        <ellipse cx="365" cy="255" rx="50" ry="32" fill="#1A0A04" opacity="0.45" filter="url(#s)"/>
      </svg>
    </figure>

    <p>I'm Sri. My earliest memories are of sundaes and milkshakes in my mom's ice cream parlor. I've kept life sweet since — spending the last decade scaling B2B SaaS startups, climbing whatever rock face is nearby, and chasing what makes me curious.</p>

    <a href="https://linkedin.com/in/srivemuri" target="_blank">LinkedIn</a>
  </main>
</body>
</html>
