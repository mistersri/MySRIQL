<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Vemuri</title>
  <meta name="description" content="Sri Vemuri — hey@mistersri.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F4EFE6;
      color: #1C1208;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    main {
      max-width: 460px;
      width: 100%;
    }

    figure {
      width: 100%;
      margin-bottom: 2.75rem;
      overflow: hidden;
    }

    figure img {
      display: block;
      width: 100%;
      height: auto;
    }

    p {
      font-size: clamp(1.15rem, 2.8vw, 1.4rem);
      font-weight: 300;
      line-height: 1.82;
      letter-spacing: 0.01em;
      margin-bottom: 2rem;
    }

    a {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #B85530;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <img src="/images/photo.jpg" alt="Sri Vemuri">
    </figure>

    <p>Hi, I'm Sri Vemuri. My earliest memories are of sundaes and milkshakes in my mom's ice cream parlor. I've kept life sweet since — spending the last decade scaling B2B SaaS startups, climbing whatever rock face is nearby, and chasing what makes me curious.</p>

    <a href="https://linkedin.com/in/srivemuri" target="_blank">LinkedIn</a>
  </main>
</body>
</html>
